<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="white">
    <title>예약 관리자</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard-dynamic-subset.min.css" />
    <style>
        :root {
            --primary: #3B82F6; 
            --bg-color: #F8FAFC; 
            --card-bg: #FFFFFF;
            --text-main: #0F172A; 
            --text-sub: #64748B;  
            --border: #CBD5E1;   
        }

        body { 
            font-family: "Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color); 
            color: var(--text-main);
            -webkit-tap-highlight-color: transparent; 
            letter-spacing: -0.02em; 
            overflow-x: hidden;
            width: 100%;
        }

        /* 숫자 너비 고정 (Tabular Nums) */
        .font-tnum {
            font-variant-numeric: tabular-nums;
            font-feature-settings: "tnum";
            letter-spacing: 0;
        }

        .pt-safe { padding-top: env(safe-area-inset-top, 20px); }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }

        body.modal-open { overflow: hidden; height: 100vh; position: fixed; width: 100%; }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .card {
            background: var(--card-bg);
            border-width: 1px;
            border-style: solid;
            border-color: var(--border);
            border-radius: 20px; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }
        .card:active { background-color: #F1F5F9; transform: scale(0.98); }

        /* 상태별 테두리 색상 강조 */
        .card.border-blue-500 { border-color: #3B82F6; border-width: 2px; }
        .card.border-emerald-500 { border-color: #10B981; border-width: 2px; }
        .card.border-slate-300 { border-color: #CBD5E1; }
        .card.border-purple-500 { border-color: #8B5CF6; border-width: 2px; } /* 대기 상태 보라색 */
        .card.border-red-500 { border-color: #EF4444; border-width: 2px; }

        .status-badge { display: inline-flex; align-items: center; justify-content: center; padding: 3px 8px; border-radius: 6px; font-size: 10px; font-weight: 800; line-height: 1; border: 1px solid transparent; white-space: nowrap; }
        .status-wait { background-color: #FFF7ED; color: #C2410C; border-color: #FED7AA; }
        .status-confirm { background-color: #EFF6FF; color: #1D4ED8; border-color: #BFDBFE; }
        .status-return { background-color: #F1F5F9; color: #475569; border-color: #E2E8F0; }
        .status-hold { background-color: #F5F3FF; color: #7C3AED; border-color: #DDD6FE; } /* 대기 상태 배지 */
        .status-cancel { background-color: #FEF2F2; color: #DC2626; border-color: #FECACA; }

        .header-fixed {
            background-color: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #E2E8F0;
        }

        #modal-root, #calendar-modal-root { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 200; 
            display: none; justify-content: center; align-items: center; 
        }
        #modal-root.active, #calendar-modal-root.active { display: flex; }
        
        .modal-overlay { position: absolute; inset: 0; background-color: rgba(15, 23, 42, 0.6); backdrop-filter: blur(2px); }

        .center-modal {
            position: relative; width: 92%; max-width: 400px; 
            background-color: #FFFFFF;
            border-radius: 28px; 
            max-height: 90vh;
            display: flex; flex-direction: column; 
            transform: scale(0.95); opacity: 0;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1); 
            z-index: 210;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }
        #modal-root.active .center-modal, #calendar-modal-root.active .center-modal { transform: scale(1); opacity: 1; }

        .scroll-area { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 20px; }

        .form-section { background-color: #F8FAFC; border: 1px solid #E2E8F0; border-radius: 16px; padding: 16px; margin-bottom: 16px; }
        .form-title { font-size: 13px; font-weight: 800; color: #1E293B; margin-bottom: 12px; display: flex; align-items: center; }
        .form-title::before { content: ''; width: 3px; height: 12px; background: var(--primary); margin-right: 8px; border-radius: 2px; }
        .input-label { display: block; font-size: 11px; font-weight: 700; color: #64748B; margin-bottom: 5px; margin-left: 2px; }
        
        .input-field { width: 100%; padding: 12px; background: white; border: 1px solid #E2E8F0; border-radius: 10px; font-size: 14px; font-weight: 600; outline: none; font-family: inherit; }
        .input-field:focus { border-color: var(--primary); box-shadow: 0 0 0 1px var(--primary); }

        .status-btn { border: 1px solid #E2E8F0; background: white; font-size: 12px; font-weight: 600; color: #64748B; padding: 12px 0; border-radius: 10px; transition: all 0.2s; }
        
        .chip-btn { 
            border: 1px solid #E2E8F0; 
            background: white; 
            color: var(--text-sub); 
            transition: all 0.1s; 
            border-radius: 10px; 
            font-size: 11px; 
            font-weight: 700; 
            padding: 0 12px; 
            white-space: nowrap; 
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 34px;
        }
        .chip-btn.active { background: #1E293B !important; color: white !important; border-color: #1E293B !important; }
        .venue-active-btn.active { background: #1E293B !important; color: white !important; border-color: #1E293B !important; }
        
        /* 하위 필터 스타일 */
        .delivery-sub-filter-item { border-style: dashed; }
        .delivery-sub-filter-item.active { border-style: solid; }

        .header-icon-btn { width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; background: white; border: 1px solid #E2E8F0; border-radius: 12px; color: #64748B; transition: all 0.1s; }
        .header-icon-btn:active { background: #F1F5F9; transform: scale(0.95); }

        .tab-btn { flex: 1; padding: 12px 0; font-size: 13px; font-weight: 700; color: #94A3B8; border-bottom: 2px solid transparent; transition: all 0.2s; text-align: center; }
        .tab-btn.active { color: #1E293B; border-bottom-color: #1E293B; }

        #category-section { overflow: hidden; transition: all 0.3s ease-out; max-height: 250px; opacity: 1; }
        #category-section.collapsed { max-height: 0; opacity: 0; padding-top: 0 !important; padding-bottom: 0 !important; margin: 0 !important; }

        .model-select-chip, .method-chip { padding: 8px 12px; border-radius: 10px; border: 1px solid #E2E8F0; background: white; color: #64748B; font-size: 12px; font-weight: 700; transition: all 0.2s; flex-shrink: 0; }
        .model-select-chip.active, .method-chip.active { background: #1E293B; color: white; border-color: #1E293B; }
        
        .header-input-box { height: 38px; display: flex; align-items: center; background: white; border: 1px solid #E2E8F0; border-radius: 12px; transition: all 0.2s; }

        .cal-header-grid, .cal-body-grid { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; }
        .cal-day-cell { 
            aspect-ratio: 1/1; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 14px; 
            font-weight: 600; 
            border-radius: 12px; 
            cursor: pointer; 
            transition: all 0.1s; 
            margin: 2px; /* 셀 간격 추가 */
        }
        /* 기간 선택 스타일 */
        .range-start { background-color: #2563EB !important; color: white !important; }
        .range-end { background-color: #2563EB !important; color: white !important; }
        .range-middle { background-color: #EFF6FF !important; color: #1E293B !important; border-radius: 4px !important; }

        @keyframes fade-in-up {
            0% { opacity: 0; transform: translate(-50%, 20px); }
            100% { opacity: 1; transform: translate(-50%, 0); }
        }
        .toast-msg { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #191F28; color: white; padding: 12px 20px; border-radius: 50px; font-size: 13px; font-weight: 700; z-index: 1000; animation: fade-in-up 0.3s ease-out; }

        .rotate-180 { transform: rotate(180deg); }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen relative pb-safe">

    <!-- 1. 헤더 영역 -->
    <header class="sticky top-0 z-30 header-fixed pt-safe bg-white/95">
        <div class="px-4 pt-3 pb-1">
            
            <!-- 1. 카테고리 탭 -->
            <div class="flex border-b border-slate-100 relative pr-10 mb-2">
                <button onclick="switchTab('model')" id="tab-model" class="tab-btn active">📱 모델</button>
                <button onclick="switchTab('delivery')" id="tab-delivery" class="tab-btn">📦 수령</button>
                <button onclick="switchTab('return')" id="tab-return" class="tab-btn">↩️ 반납</button>
                <button onclick="toggleCategorySection()" class="absolute right-0 top-0 bottom-0 w-10 flex items-center justify-center text-slate-400">
                    <svg id="fold-arrow" class="fold-icon transition-transform" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"></polyline></svg>
                </button>
            </div>

            <!-- 2. 카테고리 상세 필터 -->
            <div id="category-section" class="pb-3">
                <div id="filter-group-model" class="flex gap-1.5 overflow-x-auto hide-scrollbar">
                    <button onclick="setModelFilter('all')" class="chip-btn model-filter-item active" data-id="all">전체</button>
                    <button onclick="setModelFilter('23U')" class="chip-btn model-filter-item" data-id="23U">23U</button>
                    <button onclick="setModelFilter('24U')" class="chip-btn model-filter-item" data-id="24U">24U</button>
                    <button onclick="setModelFilter('25U')" class="chip-btn model-filter-item" data-id="25U">25U</button>
                    <button onclick="setModelFilter('26U')" class="chip-btn model-filter-item" data-id="26U">26U</button>
                    <button onclick="setModelFilter('17P')" class="chip-btn model-filter-item" data-id="17P">17P</button>
                    <button onclick="setModelFilter('17PM')" class="chip-btn model-filter-item" data-id="17PM">17PM</button>
                </div>
                <div id="filter-group-delivery" class="hidden gap-1.5 flex-col">
                    <div class="flex gap-1.5 overflow-x-auto hide-scrollbar">
                        <button onclick="setDeliveryFilter('all')" class="chip-btn delivery-filter-item active" data-id="all">전체</button>
                        <button onclick="setDeliveryFilter('택배')" class="chip-btn delivery-filter-item" data-id="택배">택배</button>
                        <button onclick="setDeliveryFilter('공연장')" class="chip-btn delivery-filter-item" data-id="공연장">공연장</button>
                        <button onclick="setDeliveryFilter('사무실')" class="chip-btn delivery-filter-item" data-id="사무실">사무실</button>
                    </div>
                    <!-- 수령 방법 하위 필터 (남은인원/수령인원) -->
                    <div id="sub-filter-group-delivery" class="hidden gap-1.5 mt-2 overflow-x-auto hide-scrollbar">
                        <button onclick="setDeliverySubFilter('all')" class="chip-btn delivery-sub-filter-item active" data-id="all">전체</button>
                        <button onclick="setDeliverySubFilter('remaining')" class="chip-btn delivery-sub-filter-item" data-id="remaining">남은인원</button>
                        <button onclick="setDeliverySubFilter('pickedup')" class="chip-btn delivery-sub-filter-item" data-id="pickedup">수령인원</button>
                    </div>
                </div>
                <div id="filter-group-return" class="hidden gap-1.5 overflow-x-auto hide-scrollbar">
                    <button onclick="setReturnFilter('all')" class="chip-btn return-filter-item active" data-id="all">전체</button>
                    <button onclick="setReturnFilter('택배')" class="chip-btn return-filter-item" data-id="택배">택배</button>
                    <button onclick="setReturnFilter('당일')" class="chip-btn return-filter-item" data-id="당일">당일</button>
                    <button onclick="setReturnFilter('사무실')" class="chip-btn return-filter-item" data-id="사무실">사무실</button>
                </div>
            </div>

            <!-- 3. 검색바 & 백업 & 연장 버튼 -->
            <div class="flex items-center gap-1.5 mb-2">
                <div class="flex-1 relative header-input-box px-3 shadow-sm focus-within:ring-1 focus-within:ring-blue-400">
                    <svg class="text-slate-400 mr-2 shrink-0" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                    <input type="text" id="search-input" onkeyup="filterData()" placeholder="이름/연락처 검색" class="w-full bg-transparent border-none text-[12px] font-bold text-slate-900 placeholder-slate-400 outline-none p-0 h-full">
                </div>

                <button onclick="toggleBackupFilter()" id="btn-quick-backup" class="h-[38px] px-3 rounded-xl text-[12px] font-bold border border-slate-200 bg-white text-slate-600 shadow-sm shrink-0 active:scale-95 transition-all flex items-center gap-1">
                    💾 백업 <span id="quick-backup-count" class="ml-1 text-[10px] opacity-70 font-tnum">0</span>
                </button>
                <button onclick="toggleExtensionFilter()" id="btn-quick-extension" class="h-[38px] px-3 rounded-xl text-[12px] font-bold border border-slate-200 bg-white text-slate-600 shadow-sm shrink-0 active:scale-95 transition-all flex items-center gap-1">
                    ⏰ 연장 <span id="quick-extension-count" class="ml-1 text-[10px] opacity-70 font-tnum">0</span>
                </button>

                <button onclick="openCalendar()" class="header-icon-btn shadow-sm relative active:scale-95 transition-all">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                    <div id="date-active-dot" class="hidden absolute top-2 right-2 w-1.5 h-1.5 bg-blue-500 rounded-full border border-white"></div>
                </button>
                <button onclick="fetchData()" class="header-icon-btn shadow-sm shrink-0 active:scale-95 transition-all">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg>
                </button>
            </div>

            <!-- 4. 날짜 바 -->
            <div id="active-date-bar" class="hidden mb-2 px-3 py-2 bg-blue-50 border border-blue-100 rounded-xl flex justify-between items-center">
                <span id="active-date-text" class="text-blue-600 text-xs font-bold font-tnum"></span>
                <button onclick="clearDate(event)" class="text-blue-400 hover:text-blue-600 font-bold text-[10px] px-2 py-1 bg-white rounded-lg border border-blue-100">해제</button>
            </div>
        </div>
        <input type="date" id="filter-date" class="hidden">
    </header>

    <!-- 2. 리스트 영역 -->
    <main id="main-content" class="px-4 py-4 pb-32">
        <div id="loading" class="flex flex-col items-center justify-center py-24">
            <div class="w-9 h-9 border-4 border-slate-100 border-t-blue-500 rounded-full animate-spin mb-4"></div>
            <p class="text-[13px] font-bold text-slate-400">정보를 동기화하고 있어요</p>
        </div>
        <div id="list-container" class="grid grid-cols-2 gap-3"></div>
    </main>

    <!-- 3. 상세 정보 모달 -->
    <div id="modal-root">
        <div class="modal-overlay" onclick="closeModal()"></div>
        <div class="center-modal shadow-2xl">
            <div class="px-6 py-5 border-b border-slate-200 flex-none bg-white rounded-t-[28px] flex justify-between items-center shadow-sm">
                <h2 class="text-[19px] font-black tracking-tight text-slate-900">예약 상세 내용</h2>
                <button type="button" onclick="closeModal()" class="p-2 bg-slate-100 rounded-full text-slate-500 active:scale-90 transition-all">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
                </button>
            </div>
            <div class="scroll-area bg-[#F9FAFB]">
                <form id="edit-form" onsubmit="submitUpdate(event)">
                    <input type="hidden" id="edit-row">
                    <input type="hidden" id="edit-sheet-name"> <!-- 시트명 전송용 숨김 필드 -->
                    
                    <div class="form-section shadow-sm">
                        <div class="flex justify-between items-center mb-3">
                            <div class="form-title !mb-0">고객 정보</div>
                            <span id="display-order-time" class="text-[11px] font-bold text-slate-400 font-tnum">접수: -</span>
                        </div>
                        <div class="grid grid-cols-12 gap-3">
                            <div class="col-span-4 input-group"><label class="input-label">이름</label><input type="text" id="edit-name" class="input-field"></div>
                            <div class="col-span-8 input-group">
                                <label class="input-label">연락처</label>
                                <input type="text" id="edit-phone" class="input-field font-tnum font-bold">
                            </div>
                        </div>
                    </div>

                    <div class="form-section">
                        <div class="form-title">진행 상태</div>
                        <input type="hidden" id="edit-status-val">
                        <!-- 취소 버튼 추가를 위해 grid-cols-5로 설정 -->
                        <div class="grid grid-cols-5 gap-1">
                            <button type="button" onclick="setEditStatus('예약신청')" id="btn-status-wait" class="status-btn py-3.5 rounded-xl text-xs font-black border border-slate-200 bg-white text-slate-400 transition-all">신청</button>
                            <button type="button" onclick="setEditStatus('대기')" id="btn-status-hold" class="status-btn py-3.5 rounded-xl text-xs font-black border border-slate-200 bg-white text-slate-400 transition-all">대기</button>
                            <button type="button" onclick="setEditStatus('확정')" id="btn-status-confirm" class="status-btn py-3.5 rounded-xl text-xs font-black border border-slate-200 bg-white text-slate-400 transition-all">확정</button>
                            <button type="button" onclick="setEditStatus('반납완료')" id="btn-status-return" class="status-btn py-3.5 rounded-xl text-xs font-black border border-slate-200 bg-white text-slate-400 transition-all">반납</button>
                            <button type="button" onclick="setEditStatus('취소')" id="btn-status-cancel" class="status-btn py-3.5 rounded-xl text-xs font-black border border-slate-200 bg-white text-slate-400 transition-all">취소</button>
                        </div>
                    </div>

                    <div class="form-section shadow-sm">
                        <div class="form-title">기기 및 결제</div>
                        <div class="space-y-4">
                            <div>
                                <label class="input-label">배정 기기명</label>
                                <div class="flex gap-1.5 overflow-x-auto hide-scrollbar pb-1" id="edit-model-list">
                                    <button type="button" onclick="selectEditModel('23U')" class="model-select-chip" data-val="23U">23U</button>
                                    <button type="button" onclick="selectEditModel('24U')" class="model-select-chip" data-val="24U">24U</button>
                                    <button type="button" onclick="selectEditModel('25U')" class="model-select-chip" data-val="25U">25U</button>
                                    <button type="button" onclick="selectEditModel('26U')" class="model-select-chip" data-val="26U">26U</button>
                                    <button type="button" onclick="selectEditModel('17P')" class="model-select-chip" data-val="17P">17P</button>
                                    <button type="button" onclick="selectEditModel('17PM')" class="model-select-chip" data-val="17PM">17PM</button>
                                    <button type="button" onclick="selectEditModel('기타')" class="model-select-chip" data-val="기타">기타</button>
                                </div>
                                <input type="hidden" id="edit-model-type">
                                <div class="flex gap-3 mt-3">
                                    <div class="flex-[2]"><label class="input-label">기기 상세/번호</label><input type="text" id="edit-device-id" placeholder="예: 12" class="input-field font-tnum"></div>
                                    <div class="flex-1">
                                        <label class="input-label">보조배터리</label>
                                        <label class="checkbox-wrapper cursor-pointer block h-[46px]">
                                            <input type="checkbox" id="edit-battery" class="hidden">
                                            <div id="battery-box-ui" class="w-full h-full border border-slate-200 rounded-xl flex items-center justify-center bg-white text-slate-400 transition-all font-bold text-xs">⚡ 포함</div>
                                        </label>
                                    </div>
                                </div>
                            </div>
                            <div>
                                <label class="input-label">결제 금액</label>
                                <input type="text" id="edit-price" placeholder="금액 입력" inputmode="numeric" class="input-field font-bold text-blue-600 font-tnum">
                            </div>
                            <div><label class="input-label">송장번호</label><input type="text" id="edit-tracking" placeholder="숫자만 입력" inputmode="numeric" class="input-field font-tnum font-bold"></div>
                            <div><label class="input-label">메모</label><textarea id="edit-memo" rows="2" placeholder="메모 입력" class="input-field resize-none"></textarea></div>
                        </div>
                    </div>

                    <!-- 대여 일정 및 방법 (아코디언 & 칩) -->
                    <div class="form-section shadow-sm">
                        <div class="flex justify-between items-center py-1 cursor-pointer" onclick="toggleSection('schedule-section', 'schedule-arrow')">
                            <div class="form-title">대여 일정 및 방법</div>
                            <svg id="schedule-arrow" class="w-5 h-5 text-slate-400 transition-transform duration-200" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
                        </div>
                        <div id="schedule-section" class="mt-4">
                            <div class="grid grid-cols-2 gap-3 mb-4">
                                <div><label class="input-label">수령일</label><input type="date" id="edit-start" class="input-field font-tnum"></div>
                                <div><label class="input-label">반납일</label><input type="date" id="edit-end" class="input-field font-tnum"></div>
                            </div>
                            <div class="mb-3">
                                <label class="input-label">수령 방법</label>
                                <div class="flex gap-1.5 overflow-x-auto hide-scrollbar" id="delivery-method-list">
                                    <button type="button" onclick="selectMethod('delivery', '택배')" class="method-chip" data-val="택배">택배</button>
                                    <button type="button" onclick="selectMethod('delivery', '공연장')" class="method-chip" data-val="공연장">공연장</button>
                                    <button type="button" onclick="selectMethod('delivery', '사무실')" class="method-chip" data-val="사무실">사무실</button>
                                    <button type="button" onclick="selectMethod('delivery', '퀵')" class="method-chip" data-val="퀵">퀵</button>
                                </div>
                                <input type="hidden" id="edit-delivery">
                            </div>
                            <div>
                                <label class="input-label">반납 방법</label>
                                <div class="flex gap-1.5 overflow-x-auto hide-scrollbar" id="return-method-list">
                                    <button type="button" onclick="selectMethod('return', '택배')" class="method-chip" data-val="택배">택배</button>
                                    <button type="button" onclick="selectMethod('return', '공연장')" class="method-chip" data-val="공연장">공연장</button>
                                    <button type="button" onclick="selectMethod('return', '당일반납')" class="method-chip" data-val="당일반납">당일반납</button>
                                    <button type="button" onclick="selectMethod('return', '사무실')" class="method-chip" data-val="사무실">사무실</button>
                                </div>
                                <input type="hidden" id="edit-return-way">
                            </div>
                        </div>
                    </div>
                </form>
            </div>
            <div class="p-5 border-t border-slate-200 flex gap-3 rounded-b-[28px] bg-white pb-10">
                <button type="button" onclick="confirmDelete()" class="w-1/4 bg-[#FEE2E2] text-[#DC2626] font-bold py-4 rounded-2xl active:scale-95 transition-all text-sm">삭제</button>
                <button type="button" onclick="submitUpdate(event)" id="save-btn" class="w-3/4 bg-[#0064FF] text-white font-bold py-4 rounded-2xl shadow-lg shadow-blue-100 active:scale-95 text-base transition-all">수정 완료하기</button>
            </div>
        </div>
    </div>

    <!-- 토스 스타일 알림창 -->
    <div id="app-modal" class="fixed inset-0 hidden flex items-center justify-center px-6" style="z-index: 9999;">
        <div class="absolute inset-0 bg-black/40 backdrop-blur-sm transition-opacity" onclick="closeAppModal()"></div>
        <div id="app-modal-box" class="bg-white rounded-[28px] p-7 w-full max-w-xs relative z-10 shadow-2xl transform transition-all">
            <div class="text-center mb-6">
                <div id="modal-icon" class="text-4xl mb-4">🔔</div>
                <h3 id="modal-title" class="text-xl font-black text-[#191F28] mb-2">알림</h3>
                <p id="modal-message" class="text-[#4E5968] text-sm font-medium leading-relaxed break-keep"></p>
            </div>
            <div id="modal-actions" class="flex flex-col gap-2"></div>
        </div>
    </div>

    <!-- 캘린더 모달 -->
    <div id="calendar-modal-root">
        <div class="modal-overlay" onclick="closeCalendar()"></div>
        <div class="center-modal shadow-2xl bg-white">
            <div class="px-6 py-5 border-b border-slate-100 flex justify-between items-center rounded-t-[28px]">
                <h2 class="text-lg font-bold text-slate-800">날짜 선택</h2>
                <button onclick="closeCalendar()" class="p-2 text-slate-400 transition-all">✕</button>
            </div>
            <div class="p-5">
                <div class="flex justify-between items-center mb-6 px-4">
                    <button onclick="moveMonth(-1)" class="p-2 text-slate-500 active:scale-75 transition-all">◀</button>
                    <div id="cal-month-title" class="text-lg font-black text-slate-900 font-tnum"></div>
                    <button onclick="moveMonth(1)" class="p-2 text-slate-500 active:scale-75 transition-all">▶</button>
                </div>
                <div class="cal-header-grid mb-3">
                    <div class="text-[11px] font-bold text-red-400">일</div>
                    <div class="text-[11px] font-bold text-slate-400">월</div>
                    <div class="text-[11px] font-bold text-slate-400">화</div>
                    <div class="text-[11px] font-bold text-slate-400">수</div>
                    <div class="text-[11px] font-bold text-slate-400">목</div>
                    <div class="text-[11px] font-bold text-slate-400">금</div>
                    <div class="text-[11px] font-bold text-blue-400">토</div>
                </div>
                <div id="cal-grid" class="cal-body-grid gap-y-1 font-tnum"></div>
            </div>
        </div>
    </div>

    <script>
        // 최신 API URL 적용
        const API_URL = "https://script.google.com/macros/s/AKfycbzMhyOyblelJM4Ze7_8FRYvLhbJSfwILh7Fct6bkHebL_8cYRefkxIipvnThGIis0a7_g/exec"; 
        const MODEL_LIST = ['23U', '24U', '25U', '26U', '17P', '17PM'];
        const STATUS_PRIORITY = { '예약신청': 1, '대기': 2, '확정': 3, '반납완료': 4, '취소': 5 };

        let allData = [];
        let currentFilterStatus = 'all';
        let currentModelFilter = 'all';
        let currentDeliveryFilter = 'all';
        let currentDeliverySubFilter = 'all';
        let currentReturnFilter = 'all';
        let isVenueMode = false;
        
        let dateRange = { start: null, end: null };
        let calCurrentDate = new Date(); 

        window.onload = () => fetchData();

        async function fetchData() {
            toggleLoading(true);
            try {
                const res = await fetch(`${API_URL}?type=admin_list`);
                const json = await res.json();
                if(json.result === 'success') {
                    allData = json.data.sort(sortLogic);
                    filterData();
                } else { showToast("데이터 로드 실패"); }
            } catch(e) { showToast("네트워크 오류"); } 
            finally { toggleLoading(false); }
        }

        function sortLogic(a, b) {
            const pA = STATUS_PRIORITY[a.status] || 6;
            const pB = STATUS_PRIORITY[b.status] || 6;
            if (pA !== pB) return pA - pB; 
            const timeA = new Date(a.orderTime).getTime();
            const timeB = new Date(b.orderTime).getTime();
            if (!isNaN(timeA) && !isNaN(timeB)) return timeB - timeA;
            return b.row - a.row;
        }

        function toggleLoading(show) {
            const list = document.getElementById('list-container');
            const loader = document.getElementById('loading');
            if(show) { if(list) list.innerHTML = ''; if(loader) loader.classList.remove('hidden'); }
            else { if(loader) loader.classList.add('hidden'); }
        }

        function filterData() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const today = new Date(); today.setHours(0,0,0,0);
            
            const counts = { 
                model: { 'all': 0, '23U': 0, '24U': 0, '25U': 0, '26U': 0, '17P': 0, '17PM': 0, '백업': 0, '연장': 0 },
                delivery: { 'all': 0, '택배': 0, '공연장': 0, '사무실': 0 },
                deliverySub: { 'all': 0, 'remaining': 0, 'pickedup': 0 },
                return: { 'all': 0, '택배': 0, '당일': 0, '사무실': 0 },
                venue: { rem: 0, pick: 0 }
            };

            const filtered = allData.filter(item => {
                const name = (item.name || '').toLowerCase();
                const phone = (item.phone || '').toLowerCase();
                const model = (item.model || '').toUpperCase();
                const delivery = (item.delivery || '');
                const status = (item.status || '');
                const startDateStr = item.startDate;
                
                const cleanModel = model.replace(/\s*\+?\s*보조배터리/g, '').trim();
                const isAssigned = /\d$/.test(cleanModel);

                const matchQuery = name.includes(query) || phone.includes(query) || model.includes(query);
                
                let matchDate = true;
                if (dateRange.start) {
                    if (!startDateStr) {
                        matchDate = false;
                    } else {
                        if (dateRange.end) {
                            matchDate = startDateStr >= dateRange.start && startDateStr <= dateRange.end;
                        } else {
                            matchDate = startDateStr === dateRange.start;
                        }
                    }
                }

                if (matchDate && matchQuery) {
                    counts.model.all++;
                    MODEL_LIST.forEach(m => { if(model.includes(m)) counts.model[m]++; });
                    if (model.includes('백업')) counts.model['백업']++;
                    if (model.includes('연장')) counts.model['연장']++;

                    counts.delivery.all++;
                    if (delivery.includes('택배')) counts.delivery['택배']++;
                    if (delivery.includes('공연') || delivery.includes('현장')) counts.delivery['공연장']++;
                    if (delivery.includes('사무실')) counts.delivery['사무실']++;

                    const matchCurrentDelivery = (currentDeliveryFilter === 'all') || delivery.includes(currentDeliveryFilter);
                    if (matchCurrentDelivery) {
                        counts.deliverySub.all++;
                        if (!isAssigned) counts.deliverySub.remaining++; 
                        else counts.deliverySub.pickedup++; 
                    }

                    counts.return.all++;
                    if (item.returnWay && item.returnWay.includes('택배')) counts.return['택배']++;
                    if (item.returnWay && item.returnWay.includes('당일')) counts.return['당일']++;
                    if (item.returnWay && item.returnWay.includes('사무실')) counts.return['사무실']++;

                    if (delivery.includes('공연') || delivery.includes('현장')) {
                        if(isAssigned) counts.venue.pick++; else counts.venue.rem++;
                    }
                }

                if (currentFilterStatus !== 'all' && status !== currentFilterStatus) return false;

                const matchModel = (currentModelFilter === 'all') || model.includes(currentModelFilter.toUpperCase());
                const matchDelivery = (currentDeliveryFilter === 'all') || delivery.includes(currentDeliveryFilter);
                const matchReturn = (currentReturnFilter === 'all') || (item.returnWay || '').includes(currentReturnFilter);

                let matchDeliverySub = true;
                if (currentDeliveryFilter !== 'all') { 
                     if (currentDeliverySubFilter === 'remaining' && isAssigned) matchDeliverySub = false;
                     if (currentDeliverySubFilter === 'pickedup' && !isAssigned) matchDeliverySub = false;
                }

                if (isVenueMode) {
                    if (!delivery.includes('공연') && !delivery.includes('현장')) return false;
                    if (currentFilterStatus === 'venue_remaining' && isAssigned) return false;
                    if (currentFilterStatus === 'venue_pickedup' && !isAssigned) return false;
                }

                return matchQuery && matchDate && matchModel && matchDelivery && matchReturn && matchDeliverySub;
            });

            const backupCountEl = document.getElementById('quick-backup-count');
            if(backupCountEl) backupCountEl.innerText = counts.model['백업'];
            
            const extensionCountEl = document.getElementById('quick-extension-count');
            if(extensionCountEl) extensionCountEl.innerText = counts.model['연장'];

            updateFilterUI(counts);
            filtered.sort(sortLogic);
            renderList(filtered); 
        }

        function updateFilterUI(counts) {
            const updateTabCounts = (groupId, countObj) => {
                document.querySelectorAll(`#${groupId} button`).forEach(btn => {
                    const id = btn.getAttribute('data-id');
                    if(countObj[id] !== undefined) {
                        const count = countObj[id];
                        let baseText = id;
                        if(id === 'all') baseText = '전체';
                        else if(id === 'remaining') baseText = '남은인원';
                        else if(id === 'pickedup') baseText = '수령인원';
                        
                        btn.innerText = `${baseText}(${count})`;
                        
                        if (id !== 'all' && count === 0) {
                            btn.classList.add('hidden');
                        } else {
                            btn.classList.remove('hidden');
                        }
                    }
                });
            };
            updateTabCounts('filter-group-model', counts.model);
            updateTabCounts('filter-group-delivery', counts.delivery);
            updateTabCounts('sub-filter-group-delivery', counts.deliverySub); 
            updateTabCounts('filter-group-return', counts.return);
            
            const backupBtn = document.getElementById('btn-quick-backup');
            if(backupBtn) {
                const count = counts.model['백업'];
                if (count === 0) {
                    backupBtn.classList.add('hidden');
                } else {
                    backupBtn.classList.remove('hidden');
                    if(currentModelFilter === '백업') {
                        backupBtn.classList.add('bg-slate-800', 'text-white', 'border-slate-800');
                        backupBtn.classList.remove('bg-white', 'text-slate-600', 'border-slate-200');
                    } else {
                        backupBtn.classList.remove('bg-slate-800', 'text-white', 'border-slate-800');
                        backupBtn.classList.add('bg-white', 'text-slate-600', 'border-slate-200');
                    }
                }
            }

            const extensionBtn = document.getElementById('btn-quick-extension');
            if(extensionBtn) {
                const count = counts.model['연장'];
                if (count === 0) {
                    extensionBtn.classList.add('hidden');
                } else {
                    extensionBtn.classList.remove('hidden');
                    if(currentModelFilter === '연장') {
                        extensionBtn.classList.add('bg-slate-800', 'text-white', 'border-slate-800');
                        extensionBtn.classList.remove('bg-white', 'text-slate-600', 'border-slate-200');
                    } else {
                        extensionBtn.classList.remove('bg-slate-800', 'text-white', 'border-slate-800');
                        extensionBtn.classList.add('bg-white', 'text-slate-600', 'border-slate-200');
                    }
                }
            }
        }

        function toggleBackupFilter() {
            if (currentModelFilter === '백업') {
                setModelFilter('all');
            } else {
                setModelFilter('백업');
            }
        }

        function toggleExtensionFilter() {
            if (currentModelFilter === '연장') {
                setModelFilter('all');
            } else {
                setModelFilter('연장');
            }
        }

        function filterStatus(status) {
            currentFilterStatus = status;
            filterData();
        }

        function setDeliveryFilter(d) { 
            currentDeliveryFilter = d; 
            currentDeliverySubFilter = 'all'; 
            
            document.querySelectorAll('.delivery-filter-item').forEach(b => b.classList.toggle('active', b.dataset.id === d)); 
            
            const subGroup = document.getElementById('sub-filter-group-delivery');
            if (d === 'all') {
                subGroup.classList.add('hidden');
                subGroup.classList.remove('flex');
            } else {
                subGroup.classList.remove('hidden');
                subGroup.classList.add('flex');
            }
            
            document.querySelectorAll('.delivery-sub-filter-item').forEach(b => b.classList.toggle('active', b.dataset.id === 'all'));

            filterData(); 
        }

        function setDeliverySubFilter(sub) {
            currentDeliverySubFilter = sub;
            document.querySelectorAll('.delivery-sub-filter-item').forEach(b => b.classList.toggle('active', b.dataset.id === sub));
            filterData();
        }

        function renderList(list) {
            const container = document.getElementById('list-container');
            container.innerHTML = '';
            if(!list.length) { container.innerHTML = `<div class="col-span-2 py-20 text-center text-slate-400 text-sm font-medium">정보가 없습니다.</div>`; return; }
            
            list.forEach(item => {
                let borderColor = 'border-slate-300';
                if(item.status === '예약신청') borderColor = 'border-blue-500';
                else if(item.status === '확정') borderColor = 'border-emerald-500';
                else if(item.status === '반납완료') borderColor = 'border-slate-300';
                else if(item.status === '대기') borderColor = 'border-purple-500';
                else if(item.status === '취소') borderColor = 'border-red-500';

                let badgeClass = 'status-wait', badgeText = '신청';
                if(item.status === '확정') { badgeClass = 'status-confirm'; badgeText = '확정'; }
                else if(item.status === '반납완료') { badgeClass = 'status-return'; badgeText = '반납'; }
                else if(item.status === '대기') { badgeClass = 'status-hold'; badgeText = '대기'; }
                else if(item.status === '취소') { badgeClass = 'status-cancel'; badgeText = '취소'; }

                const time = formatTime(item.orderTime);
                const price = (parseInt(String(item.totalPrice||0).replace(/[^0-9]/g, '')) || 0).toLocaleString() + '원';
                const start = (item.startDate || '').substring(5).replace('-','.');
                const end = (item.endDate || '').substring(5).replace('-','.');
                const clean = t => (t||'').replace(/수령|반납/g, '').trim();
                const displayModel = (item.model || '').replace(/\s*\+?\s*보조배터리/g, '').trim();
                const battery = (item.model || '').includes('보조배터리') ? '⚡' : '';
                const truck = item.trackingNumber ? '🚚' : '';
                const memo = item.memo ? '📝' : '';

                const rawPay = item.paymentMethod || ''; 
                let payShort = rawPay;
                let payBadgeClass = 'bg-slate-100 text-slate-600'; 

                if(rawPay.includes('계좌이체')) {
                    payShort = '이체';
                    payBadgeClass = 'bg-blue-100 text-blue-600 border border-blue-200'; 
                } else if(rawPay.includes('네이버스토어결제') || rawPay.includes('카드')) {
                    payShort = '카드';
                    payBadgeClass = 'bg-emerald-100 text-emerald-600 border border-emerald-200'; 
                } else if(rawPay === '') {
                    payShort = '-';
                }

                const card = document.createElement('div');
                card.className = `card px-4 pt-2 pb-4 relative flex flex-col gap-1.5 ${borderColor}`;
                card.onclick = () => openModal(item);
                
                card.innerHTML = `
                    <div class="flex justify-end text-right">
                         <span class="text-[9px] leading-tight text-slate-400 font-medium font-tnum">${time}</span>
                    </div>
                    <div class="flex flex-col gap-0.5">
                         <div class="flex items-center gap-1.5">
                            <span class="status-badge ${badgeClass}">${badgeText}</span>
                            <span class="text-[17px] font-black text-slate-900 truncate leading-none">${item.name}</span>
                            <span>${memo}</span>
                        </div>
                        <div class="flex items-center gap-1 mt-1 pl-0.5">
                            <span class="text-[12px] text-slate-500 font-mono font-bold font-tnum">${item.phone || ''}</span>
                            <button onclick="copyToClipboard('${item.phone}', event)" class="p-1 bg-transparent rounded text-slate-300 active:scale-75">
                                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                            </button>
                        </div>
                    </div>
                    <div class="bg-slate-50 rounded-lg p-3 border border-slate-100 flex flex-col gap-2 shadow-inner">
                         <div class="flex items-center gap-1 pb-1.5 border-b border-slate-200 border-dashed">
                             <span class="bg-white text-slate-700 px-2 py-0.5 rounded-[5px] font-extrabold text-[12px] border border-slate-200 truncate">📱 ${displayModel || '미정'}</span>
                             ${battery}
                         </div>
                         <div class="text-[14px] font-extrabold text-slate-800 truncate leading-tight">${item.scheduleName || '-'}</div>
                         <div class="flex items-center gap-2 text-[13px] font-black text-slate-700 font-tnum">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="text-slate-400"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                            <span>${start} ~ ${end}</span>
                         </div>
                         <div class="flex justify-between items-center pt-1.5 border-t border-slate-100 border-dashed">
                             <div class="flex items-center gap-1 text-[13px] font-extrabold text-blue-600">
                                 <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="text-blue-400"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg>
                                 <span>${clean(item.delivery)} ➔ ${clean(item.returnWay)}</span>
                             </div>
                             <span class="text-[12px] font-tnum">${truck}</span>
                         </div>
                         <div class="flex justify-between items-center pt-1 border-t border-slate-200">
                             <div class="flex items-center gap-1">
                                 <span class="text-[11px] font-black px-1.5 py-0.5 rounded-[6px] ${payBadgeClass}">${payShort}</span>
                             </div>
                             <span class="text-[16px] font-black text-slate-900 tracking-tight font-tnum">${price}</span>
                         </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function formatTime(str) {
            if(!str) return '';
            const s = String(str);
            const result = s.replace(/(\d{1,2}\.?)\s+(오전|오후|\d{1,2}:)/, '$1<br>$2');
            if (result === s) {
                const d = new Date(str);
                if(!isNaN(d.getTime())) {
                    const datePart = `${d.getFullYear()}. ${d.getMonth() + 1}. ${d.getDate()}.`;
                    const timePart = d.toLocaleTimeString('ko-KR', { hour: 'numeric', minute: 'numeric', second: 'numeric', hour12: true });
                    return `${datePart}<br>${timePart}`;
                }
            }
            return result;
        }

        function toggleVenueMode() {
            isVenueMode = !isVenueMode;
        }

        function setVenueFilter(v) { 
            currentFilterStatus = v; 
            document.querySelectorAll('.venue-active-btn').forEach(b => {
                b.classList.toggle('active', b.getAttribute('data-val') === v);
            });
            filterData(); 
        }

        function setEditStatus(status) {
            const statusInput = document.getElementById('edit-status-val');
            if (statusInput) statusInput.value = status;
            ['wait','confirm','return','cancel','hold'].forEach(k => {
                const btn = document.getElementById(`btn-status-${k}`);
                if(btn) {
                    btn.className = "status-btn py-3.5 rounded-xl text-xs font-black border border-slate-200 bg-white text-slate-400 transition-all";
                    btn.style = ""; 
                }
            });
            const map = { '예약신청':'wait', '확정':'confirm', '반납완료':'return', '취소':'cancel', '대기':'hold' };
            const activeKey = map[status];
            const activeBtn = document.getElementById(`btn-status-${activeKey}`);
            if(activeBtn) {
                if(status === '예약신청') { activeBtn.style.backgroundColor = '#FFF7ED'; activeBtn.style.color = '#C2410C'; activeBtn.style.borderColor = '#FDBA74'; }
                else if(status === '확정') { activeBtn.style.backgroundColor = '#0064FF'; activeBtn.style.color = 'white'; activeBtn.style.borderColor = '#0064FF'; }
                else if(status === '반납완료') { activeBtn.style.backgroundColor = '#4B5563'; activeBtn.style.color = 'white'; activeBtn.style.borderColor = '#4B5563'; }
                else if(status === '취소') { activeBtn.style.backgroundColor = '#DC2626'; activeBtn.style.color = 'white'; activeBtn.style.borderColor = '#DC2626'; }
                else if(status === '대기') { activeBtn.style.backgroundColor = '#F5F3FF'; activeBtn.style.color = '#7C3AED'; activeBtn.style.borderColor = '#DDD6FE'; }
            }
        }

        function selectMethod(type, value) {
            let finalValue = value;
            // 수령/반납 단어가 포함되어 있지 않은 경우에만 뒤에 추가
            if (type === 'delivery' && !finalValue.includes('수령')) finalValue += '수령';
            if (type === 'return' && !finalValue.includes('반납')) finalValue += '반납';

            document.getElementById(`edit-${type === 'delivery' ? 'delivery' : 'return-way'}`).value = finalValue;
            
            const containerId = type === 'delivery' ? 'delivery-method-list' : 'return-method-list';
            document.querySelectorAll(`#${containerId} .method-chip`).forEach(btn => {
                btn.classList.toggle('active', btn.dataset.val === value);
            });
        }

        function openModal(item) {
            const root = document.getElementById('modal-root');
            if(!root) return;
            document.getElementById('edit-row').value = item.row;
            document.getElementById('edit-sheet-name').value = item.sheetName || '예약내역'; // 시트명 가져오기
            document.getElementById('display-order-time').innerHTML = "접수: " + (formatTime(item.orderTime).replace('<br>', ' ') || '-');
            document.getElementById('edit-name').value = item.name || '';
            document.getElementById('edit-phone').value = item.phone || '';
            document.getElementById('edit-start').value = item.startDate || '';
            document.getElementById('edit-end').value = item.endDate || '';
            document.getElementById('edit-delivery').value = item.delivery || '';
            document.getElementById('edit-return-way').value = item.returnWay || '';
            document.getElementById('edit-tracking').value = item.trackingNumber || '';
            document.getElementById('edit-memo').value = item.memo || '';
            const priceField = document.getElementById('edit-price');
            if(priceField) priceField.value = (item.totalPrice || 0);

            const deliveryVal = item.delivery || '';
            let selectedDelivery = '';
            if(deliveryVal.includes('택배')) selectedDelivery = '택배';
            else if(deliveryVal.includes('공연장') || deliveryVal.includes('현장')) selectedDelivery = '공연장';
            else if(deliveryVal.includes('사무실')) selectedDelivery = '사무실';
            else if(deliveryVal.includes('퀵')) selectedDelivery = '퀵';
            selectMethod('delivery', selectedDelivery);
            document.getElementById('edit-delivery').value = deliveryVal; 

            const returnVal = item.returnWay || '';
            let selectedReturn = '';
            if(returnVal.includes('택배')) selectedReturn = '택배';
            else if(returnVal.includes('공연장') || returnVal.includes('현장')) selectedReturn = '공연장';
            else if(returnVal.includes('당일')) selectedReturn = '당일반납';
            else if(returnVal.includes('사무실')) selectedReturn = '사무실'; 
            selectMethod('return', selectedReturn);
            document.getElementById('edit-return-way').value = returnVal; 

            let rawModel = item.model || '';
            const hasBattery = rawModel.includes('보조배터리');
            rawModel = rawModel.replace(/\+?\s*보조배터리/g, '').trim();
            let matchedModel = '기타', deviceId = rawModel;
            const models = ['23U', '24U', '25U', '17P', '17PM'];
            for (const m of models) { if (rawModel.toUpperCase().includes(m)) { matchedModel = m; deviceId = rawModel.replace(new RegExp(m, 'i'), '').trim(); break; } }
            selectEditModel(matchedModel);
            document.getElementById('edit-device-id').value = deviceId;
            document.getElementById('edit-battery').checked = hasBattery;
            updateBatteryUI(hasBattery);
            setEditStatus(item.status || '예약신청');
            root.style.display = 'flex';
            setTimeout(() => root.classList.add('active'), 10);
            document.body.classList.add('modal-open');
        }

        function closeModal() {
            const root = document.getElementById('modal-root');
            if(!root) root.classList.remove('active');
            setTimeout(() => { if(root) root.style.display = 'none'; document.body.classList.remove('modal-open'); }, 300);
        }

        function showAppAlert(msg, title = "알림", icon = "✨") {
            setupModal(title, msg, icon, `<button onclick="closeAppModal()" class="w-full bg-[#191F28] text-white font-bold py-4 rounded-2xl text-base">확인</button>`);
        }
        function showAppConfirm(msg, onConfirm, title="확인", btnText="확인", btnColor="bg-[#0064FF]", icon="🤔") {
            setupModal(title, msg, icon, `
                <button id="confirm-exec-btn" class="w-full ${btnColor} text-white font-bold py-4 rounded-2xl text-base mb-1">${btnText}</button>
                <button onclick="closeAppModal()" class="w-full bg-[#F2F4F6] text-[#4E5968] font-bold py-4 rounded-2xl text-base">취소</button>
            `);
            document.getElementById('confirm-exec-btn').onclick = () => { closeAppModal(); onConfirm(); };
        }
        function setupModal(title, msg, icon, buttons) {
            const m = document.getElementById('app-modal');
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-message').innerText = msg;
            document.getElementById('modal-icon').innerText = icon;
            document.getElementById('modal-actions').innerHTML = buttons;
            m.classList.remove('hidden');
        }
        function closeAppModal() { document.getElementById('app-modal').classList.add('hidden'); }

        document.getElementById('edit-battery').onchange = function() { updateBatteryUI(this.checked); };
        function updateBatteryUI(checked) {
            const box = document.getElementById('battery-box-ui');
            if(box) box.className = checked ? "w-full h-full border border-blue-500 rounded-xl flex items-center justify-center bg-blue-50 text-blue-600 transition-all font-black text-xs" : "w-full h-full border border-slate-200 rounded-xl flex items-center justify-center bg-white text-slate-400 transition-all font-bold text-xs";
        }

        function selectEditModel(modelName) {
            document.getElementById('edit-model-type').value = modelName;
            document.querySelectorAll('.model-select-chip').forEach(btn => btn.classList.toggle('active', btn.dataset.val === modelName));
        }

        async function submitUpdate(e) {
            if(e) e.preventDefault();
            const btn = document.getElementById('save-btn');
            btn.innerText = '저장 중...'; btn.disabled = true;
            
            const rowId = document.getElementById('edit-row').value;
            const modelType = document.getElementById('edit-model-type').value;
            const deviceId = document.getElementById('edit-device-id').value.trim();
            const isBattery = document.getElementById('edit-battery').checked;
            let finalModel = (modelType === '기타' ? deviceId : modelType + deviceId) + (isBattery ? "+보조배터리" : "");
            
            const payload = {
                type: 'update', 
                row: rowId, 
                sheetName: document.getElementById('edit-sheet-name').value,
                name: document.getElementById('edit-name').value, 
                phone: document.getElementById('edit-phone').value,
                startDate: document.getElementById('edit-start').value, 
                endDate: document.getElementById('edit-end').value, 
                delivery: document.getElementById('edit-delivery').value, 
                returnWay: document.getElementById('edit-return-way').value, 
                status: document.getElementById('edit-status-val').value, 
                tracking: document.getElementById('edit-tracking').value,
                model: finalModel, 
                memo: document.getElementById('edit-memo').value, 
                totalPrice: document.getElementById('edit-price').value
            };

            // 1. 실패 시 복구를 위한 '원본 데이터 백업'
            const targetIndex = allData.findIndex(item => String(item.row) === String(rowId));
            let originalData = null;
            
            if(targetIndex !== -1) {
                originalData = { ...allData[targetIndex] };
                
                // 낙관적 업데이트: 서버 응답을 기다리지 않고 화면 데이터를 즉시 변경
                allData[targetIndex] = {
                    ...allData[targetIndex],
                    name: payload.name,
                    phone: payload.phone,
                    startDate: payload.startDate,
                    endDate: payload.endDate,
                    delivery: payload.delivery,
                    returnWay: payload.returnWay,
                    status: payload.status,
                    trackingNumber: payload.tracking,
                    model: payload.model,
                    memo: payload.memo,
                    totalPrice: payload.totalPrice
                };
            }

            // 2. 즉시 UI 갱신 및 모달 닫기
            filterData();
            closeModal();
            showAppAlert("정보를 수정했습니다.", "완료", "✅"); 
            btn.innerText = '수정 완료하기'; 
            btn.disabled = false;

            // 3. 백그라운드 서버 저장 및 실패 시 롤백(Rollback)
            fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) })
                .then(res => res.json())
                .then(data => {
                    if(data.result !== 'success') throw new Error("서버에서 처리를 실패했습니다.");
                })
                .catch(err => {
                    console.error("저장 실패", err);
                    if(targetIndex !== -1 && originalData) {
                        // 에러 발생 시 원본 데이터로 다시 되돌리기
                        allData[targetIndex] = originalData; 
                        filterData(); // 화면 원상복구
                        showAppAlert("인터넷 연결 불안정 또는 서버 오류로 수정 내역이 저장되지 않았습니다. 다시 시도해 주세요.", "🚨 저장 실패", "⚠️");
                    }
                });
        }

        function confirmDelete() {
            showAppConfirm("이 예약을 '삭제' 시트로 이동시킬까요?", () => {
                const rowId = document.getElementById('edit-row').value;
                const sheetName = document.getElementById('edit-sheet-name').value;
                
                // 1. 실패 시 복구를 위한 '원본 데이터 백업'
                const targetItem = allData.find(item => String(item.row) === String(rowId));
                
                // 낙관적 업데이트: 화면에서 즉시 삭제
                allData = allData.filter(item => String(item.row) !== String(rowId));
                
                // 2. 즉시 UI 갱신 및 모달 닫기
                filterData();
                closeModal();
                showAppAlert("삭제 시트로 이동되었습니다.", "완료", "🗑️");
                
                // 3. 백그라운드 서버 전송 및 실패 시 롤백(Rollback)
                fetch(API_URL, { method: 'POST', body: JSON.stringify({ type: 'delete', row: rowId, sheetName: sheetName }) })
                .then(res => res.json())
                .then(data => {
                    if(data.result !== 'success') throw new Error("서버에서 삭제를 실패했습니다.");
                })
                .catch(err => {
                    console.error("삭제 실패", err);
                    if(targetItem) {
                        // 에러 발생 시 삭제했던 데이터를 다시 리스트에 넣기
                        allData.push(targetItem); 
                        filterData(); // 화면 원상복구
                        showAppAlert("인터넷 연결 불안정 또는 서버 오류로 삭제되지 않았습니다. 다시 시도해 주세요.", "🚨 삭제 실패", "⚠️");
                    }
                });
            }, "삭제 이동", "이동하기", "bg-[#DC2626]", "🗑️");
        }

        function copyToClipboard(text, e) {
            if(e) e.stopPropagation();
            const t = document.createElement('textarea'); t.value = text; document.body.appendChild(t); t.select(); document.execCommand('copy'); document.body.removeChild(t);
            showToast("연락처 복사 완료");
        }

        function showToast(msg) {
            const toast = document.createElement('div'); toast.className = 'toast-msg shadow-xl'; toast.innerText = msg; document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        function switchTab(tabName) {
            ['model', 'service', 'delivery', 'return'].forEach(t => {
                const btn = document.getElementById('tab-' + t);
                const filterGrp = document.getElementById('filter-group-' + t);
                if(btn) btn.classList.toggle('active', t === tabName);
                if(filterGrp) { filterGrp.classList.toggle('hidden', t !== tabName); if(t === tabName) filterGrp.classList.add('flex'); }
            });
        }

        function toggleCategorySection() {
            const section = document.getElementById('category-section');
            const arrow = document.getElementById('fold-arrow');
            const isCollapsed = section.classList.toggle('collapsed');
            arrow.style.transform = isCollapsed ? 'rotate(180deg)' : 'rotate(0deg)';
        }

        function setModelFilter(m) { currentModelFilter = m; document.querySelectorAll('.model-filter-item').forEach(b => b.classList.toggle('active', b.dataset.id === m)); filterData(); }
        function setReturnFilter(r) { currentReturnFilter = r; document.querySelectorAll('.return-filter-item').forEach(b => b.classList.toggle('active', b.dataset.id === r)); filterData(); }

        function openCalendar() {
            renderCalendar();
            const root = document.getElementById('calendar-modal-root');
            root.style.display = 'flex'; setTimeout(() => root.classList.add('active'), 10);
            document.body.classList.add('modal-open');
        }
        function closeCalendar() { const root = document.getElementById('calendar-modal-root'); if(root) root.classList.remove('active'); setTimeout(() => { if(root) root.style.display = 'none'; document.body.classList.remove('modal-open'); }, 300); }
        function moveMonth(step) { calCurrentDate.setMonth(calCurrentDate.getMonth() + step); renderCalendar(); }
        
        function renderCalendar() {
            const y = calCurrentDate.getFullYear(), m = calCurrentDate.getMonth();
            const titleEl = document.getElementById('cal-month-title');
            if(titleEl) titleEl.innerText = `${y}년 ${m + 1}월`;
            const first = new Date(y, m, 1).getDay(), last = new Date(y, m + 1, 0).getDate(), grid = document.getElementById('cal-grid');
            if(!grid) return;
            
            grid.innerHTML = ''; 
            for(let i=0; i<first; i++) grid.innerHTML += '<div></div>';
            
            for(let d=1; d<=last; d++) {
                const ds = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const div = document.createElement('div'); 
                
                let className = 'cal-day-cell hover:bg-slate-50';
                if (dateRange.start && dateRange.end) {
                    if (ds === dateRange.start) className += ' range-start';
                    else if (ds === dateRange.end) className += ' range-end';
                    else if (ds > dateRange.start && ds < dateRange.end) className += ' range-middle';
                } else if (dateRange.start && ds === dateRange.start) {
                    className += ' range-start';
                }

                div.className = className;
                div.innerText = d; 
                div.onclick = () => selectDate(ds);
                grid.appendChild(div);
            }
        }

        function selectDate(date) {
            if ((dateRange.start && dateRange.end) || (!dateRange.start)) {
                dateRange.start = date;
                dateRange.end = null;
            } 
            else if (dateRange.start && !dateRange.end) {
                if (date < dateRange.start) {
                    dateRange.start = date; 
                } else {
                    dateRange.end = date;
                    closeCalendar(); 
                }
            }
            
            renderCalendar(); 
            updateActiveDateUI();
            filterData();
        }

        function updateActiveDateUI() {
            const bar = document.getElementById('active-date-bar');
            const text = document.getElementById('active-date-text');
            const dot = document.getElementById('date-active-dot');

            if (dateRange.start) {
                bar.classList.remove('hidden');
                dot.classList.remove('hidden');
                if (dateRange.end) {
                    text.innerText = `${formatDateShort(dateRange.start)} ~ ${formatDateShort(dateRange.end)}`;
                } else {
                    text.innerText = `${formatDateShort(dateRange.start)} (기간 선택 중)`;
                }
            } else {
                bar.classList.add('hidden');
                dot.classList.add('hidden');
            }
        }

        function formatDateShort(ds) {
            const parts = ds.split('-');
            return `${parseInt(parts[1])}월 ${parseInt(parts[2])}일`;
        }

        function clearDate(e) { 
            e.stopPropagation(); 
            dateRange = { start: null, end: null };
            updateActiveDateUI();
            filterData(); 
            if(document.getElementById('calendar-modal-root').classList.contains('active')) renderCalendar();
        }
        
        function toggleSection(contentId, arrowId) {
            const content = document.getElementById(contentId);
            const arrow = document.getElementById(arrowId);
            content.classList.toggle('hidden');
            arrow.classList.toggle('rotate-180');
        }
    </script>
</body>
</html>
